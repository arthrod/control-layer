services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-control_layer}
      POSTGRES_USER: ${POSTGRES_USER:-control_layer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-control_layer_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U control_layer -d control_layer"]
      start_period: 1s
      interval: 1s
      timeout: 3s
      retries: 10

  control-layer:
    image: ${IMAGE:-ghcr.io/doublewordai/control-layer:${TAG:-latest}}
    pull_policy: ${PULL_POLICY:-always}
    # HOST_PORT: the port exposed on the Docker host (default: 3001).
    #   Override this when the default host port is already in use, e.g. HOST_PORT=8080.
    #   For Coolify deployments, set HOST_PORT to any available port or let Coolify
    #   manage port allocation through its UI.
    # CONTAINER_PORT: the port the application listens on inside the container (default: 3001).
    #   Override this only if you need the in-container port to differ from the default.
    ports:
      - "${HOST_PORT:-3001}:${CONTAINER_PORT:-3001}"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      DATABASE_URL: postgres://${POSTGRES_USER:-control_layer}:${POSTGRES_PASSWORD:-control_layer_password}@postgres:5432/${POSTGRES_DB:-control_layer}
      DWCTL_SECRET_KEY: ${DWCTL_SECRET_KEY}
      DWCTL_PORT: ${CONTAINER_PORT:-3001}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${CONTAINER_PORT:-3001}/healthz"]
      start_period: 1s
      interval: 100s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:

networks:
  default:
    driver: bridge
